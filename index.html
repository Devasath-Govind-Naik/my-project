<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login System</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}

.container {
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  background:#2a5298;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#1e3c72;
}

.error {
  color:red;
  font-size:13px;
}

.success {
  color:green;
  text-align:center;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>Secure Login</h2>
  
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  
  <div id="msg" class="error"></div>
  
  <button onclick="login()">Login</button>
</div>

<div class="container hidden" id="dashboard">
  <h2>Dashboard</h2>
  <p class="success">Login Successful ✔</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
// ===== SECURITY FUNCTIONS =====

// Prevent XSS (basic sanitization)
function sanitize(input) {
  return input.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Password strength check
function strongPassword(password) {
  let regex = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;
  return regex.test(password);
}

// Fake database
const userDB = {
  username: "admin",
  password: "Admin123"
};

// ===== LOGIN FUNCTION =====
function login() {
  let username = sanitize(document.getElementById("username").value.trim());
  let password = sanitize(document.getElementById("password").value.trim());
  let msg = document.getElementById("msg");

  // Empty check
  if(username === "" || password === "") {
    msg.innerText = "All fields required!";
    return;
  }

  // Password strength check
  if(!strongPassword(password)) {
    msg.innerText = "Weak password! Use Capital + Number";
    return;
  }

  // Authentication
  if(username === userDB.username && password === userDB.password) {
    localStorage.setItem("auth", "true");
    showDashboard();
  } else {
    msg.innerText = "Invalid credentials!";
  }
}

// ===== SESSION MANAGEMENT =====
function showDashboard() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

function logout() {
  localStorage.removeItem("auth");
  location.reload();
}

// Auto login if session exists
if(localStorage.getItem("auth") === "true") {
  showDashboard();
}
</script>

</body>
</html>
